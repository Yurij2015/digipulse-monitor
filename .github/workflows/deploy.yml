name: Deploy Monitor (Go)

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

jobs:
  build:
    name: Build binary
    runs-on: ubuntu-latest
    outputs:
      DEPLOYMENT_MATRIX: ${{ steps.export-deployment-matrix.outputs.DEPLOYMENT_MATRIX }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: go.sum

      - name: Build Statically Compiled Binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o monitor_app ./main.go

      - name: Store binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: monitor-binary
          path: monitor_app
          retention-days: 7
          if-no-files-found: error

      - name: Export deployment matrix
        id: export-deployment-matrix
        run: |
          delimiter="$(openssl rand -hex 8)"
          JSON="$(cat ./deployment-config.json)"
          echo "DEPLOYMENT_MATRIX<<${delimiter}" >> "${GITHUB_OUTPUT}"
          echo "$JSON" >> "${GITHUB_OUTPUT}"
          echo "${delimiter}" >> "${GITHUB_OUTPUT}"

  deploy:
    name: "${{ matrix.server.name }}: Deploy"
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        server: ${{ fromJson(needs.build.outputs.DEPLOYMENT_MATRIX) }}
    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: monitor-binary
          path: .

      - name: Bootstrap server directories
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ matrix.server.ip }}
          username: ${{ matrix.server.username }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ matrix.server.port }}
          script: |
            mkdir -p ${{ matrix.server.path }}

      - name: Deploy binary to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ matrix.server.ip }}
          username: ${{ matrix.server.username }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ matrix.server.port }}
          source: "monitor_app"
          target: ${{ matrix.server.path }}/

      - name: Set execute permission
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ matrix.server.ip }}
          username: ${{ matrix.server.username }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ matrix.server.port }}
          script: |
            chmod +x ${{ matrix.server.path }}/monitor_app

      - name: Write production .env
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ matrix.server.ip }}
          username: ${{ matrix.server.username }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ matrix.server.port }}
          script: |
            cat > ${{ matrix.server.path }}/.env << ENVEOF
            PORT=8080
            REDIS_ADDR=${{ secrets.REDIS_HOST }}:6379
            REDIS_PASSWORD=
            REDIS_DB=0
            MONITOR_REDIS_CHANNEL=laravel-database-monitoring:tasks
            BACKEND_URL=http://digipulse-app:8000/api/webhooks
            MONITOR_API_KEY=${{ secrets.INTERNAL_MONITOR_KEY }}
            ENVEOF

      - name: Restart Monitor Container
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ matrix.server.ip }}
          username: ${{ matrix.server.username }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ matrix.server.port }}
          script: |
            docker restart digipulse-monitor || echo "Container not running yet."

  delete-artifact:
    name: Delete GitHub artifact
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()
    steps:
      - name: Delete artifact
        uses: geekyeggo/delete-artifact@v6.0.0
        with:
          name: monitor-binary
          failOnError: false
