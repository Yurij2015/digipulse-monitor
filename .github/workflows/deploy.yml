name: Deploy Monitor (Go)

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # або '1.22' залежно від go.mod
          cache-dependency-path: go.sum

      - name: Build Statically Compiled Binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o monitor_app ./main.go

      - name: Bootstrap server directories
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Idempotent: create all required dirs on a clean server
            mkdir -p /home/yurii/digi-pulse/monitor

      - name: Deploy Binary to Hetzner via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "monitor_app"
          target: "/home/yurii/digi-pulse/monitor/"

      - name: Write production .env for monitor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cat > /home/yurii/digi-pulse/monitor/.env << 'ENVEOF'
            PORT=8080
            REDIS_ADDR=${{ secrets.REDIS_HOST }}:6379
            REDIS_PASSWORD=
            REDIS_DB=0
            MONITOR_REDIS_CHANNEL=laravel-database-monitoring:tasks
            BACKEND_URL=http://digipulse-app:8000/api/webhooks
            MONITOR_API_KEY=${{ secrets.INTERNAL_MONITOR_KEY }}
            ENVEOF

      - name: Restart Monitor Container via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Після оновлення файлу треба перезапустити контейнер, щоб підійнявся новий бінарник
            docker restart digipulse-monitor || echo "Container not running yet."
