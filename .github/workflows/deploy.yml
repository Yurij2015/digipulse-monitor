name: Deploy Monitor (Go)

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # або '1.22' залежно від go.mod
          cache-dependency-path: go.sum

      - name: Build Statically Compiled Binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o monitor_app ./main.go

      - name: Deploy Binary to Hetzner via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "monitor_app"
          target: "/home/yurii/digi-pulse/monitor/"

      - name: Restart Monitor Container via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Після оновлення файлу треба перезапустити контейнер, щоб підійнявся новий бінарник
            docker restart digipulse-monitor || echo "Container not running yet."
