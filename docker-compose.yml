services:
  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monitor-service
    ports:
      - "8081:8080"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - backend_sail

networks:
  backend_sail:
    external: true
