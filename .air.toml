root = "."
tmp_dir = "tmp"
[build]
  cmd = "go build -o ./tmp/main ./main.go"
  bin = "./tmp/main"
  full_bin = "./tmp/main"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["tmp", "vendor", ".git", "api/swagger"]
  exclude_regex = ["_test.go"]
  delay = 300
  stop_on_error = true
[log]
  time = true
[misc]
  clean_on_exit = true
